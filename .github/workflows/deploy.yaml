name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: course.prafdin.ru
          username: chekulaev17
          port: 3179
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

            IMAGE="ghcr.io/$OWNER/${{ github.event.repository.name }}"
            DEPLOY_REF="${{ github.event.release.target_commitish }}"

            cd /home/chekulaev17/catty-reminders-app

            chmod +x deploy.sh

            ./deploy.sh $IMAGE $DEPLOY_REF
