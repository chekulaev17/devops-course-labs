name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: course.prafdin.ru
          username: chekulaev17
          port: 3179
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m

          script: |
            set -e

            IMAGE_NAME="ghcr.io/chekulaev17/catty-reminders-app:latest"
            CONTAINER_NAME="catty-reminders-app"

            echo "=== Docker deployment started ==="

            echo "${{ secrets.DOCKER_PAT }}" | docker login ghcr.io -u chekulaev17 --password-stdin

            docker stop $CONTAINER_NAME || true
            docker rm -f $CONTAINER_NAME || true

            docker pull $IMAGE_NAME

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 8181:8181 \
              $IMAGE_NAME

            echo "Waiting container startup..."

            sleep 25

            echo "Checking application..."

            curl -I http://localhost:8181/login

            echo "Deploy success"
