name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app via Docker
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: course.prafdin.ru
          username: chekulaev17
          port: 3179
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            IMAGE_NAME="ghcr.io/chekulaev17/catty-reminders-app:latest"
            CONTAINER_NAME="catty-reminders-app"

            echo "=== Docker deployment started ==="

            echo "${{ secrets.DOCKER_PAT }}" | docker login ghcr.io \
              -u chekulaev17 \
              --password-stdin

            echo "=== Remove old container ==="
            docker rm -f $CONTAINER_NAME || true
            sudo fuser -k 8181/tcp || true

            echo "=== Remove cached image ==="
            docker rmi -f $IMAGE_NAME || true

            echo "=== Pull new image ==="
            docker pull $IMAGE_NAME

            echo "=== Start new container ==="
            docker run -d \
              --restart always \
              --name $CONTAINER_NAME \
              -p 8181:8181 \
              -e DEPLOY_REF=${{ github.sha }} \
              $IMAGE_NAME

            echo "=== Deploy completed ==="
