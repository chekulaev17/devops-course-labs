name: CI

on:
  push:
    branches: [ "lab2" ]
  pull_request:
    branches: [ "lab2" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run tests
        run: |
          pytest tests/ --junitxml=test_result.xml || true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml
